<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy 22nd Birthday 🎉</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;800&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(-45deg, #ff9a9e, #fad0c4, #ffdde1, #fcb69f);
    background-size: 400% 400%;
    animation: gradientBG 12s ease infinite;
    text-align: center;
    color: white;
}

@keyframes gradientBG {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

.container {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 85%;
}

.name {
    font-size: 3.5rem;
    font-weight: 800;
    animation: glow 2s ease-in-out infinite alternate;
}

@keyframes glow {
    from { text-shadow: 0 0 10px #fff, 0 0 20px #ff6b81; }
    to { text-shadow: 0 0 25px #fff, 0 0 50px #ff1493; }
}

h2 {
    margin-top: 10px;
    font-weight: 300;
}

#typedText {
    font-size: 1.1rem;
    margin-top: 20px;
    min-height: 150px;
    white-space: pre-line;
}

button {
    margin-top: 20px;
    padding: 12px 25px;
    border: none;
    border-radius: 30px;
    font-size: 1rem;
    cursor: pointer;
    background: white;
    color: #ff1493;
    font-weight: 600;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
    background: #ffe6f2;
}

.hidden-message {
    margin-top: 20px;
    font-size: 1rem;
    display: none;
    animation: fadeIn 1.5s ease forwards;
}

@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}

.wish {
    margin-top: 15px;
    font-size: 1.2rem;
    display: none;
    animation: glowWish 1.5s ease infinite alternate;
}

@keyframes glowWish {
    from { text-shadow: 0 0 10px white; }
    to { text-shadow: 0 0 25px #fff; }
}

.heart {
    position: absolute;
    bottom: -20px;
    animation: floatUp 8s linear infinite;
}

@keyframes floatUp {
    0% { transform: translateY(0); opacity: 1; }
    100% { transform: translateY(-100vh); opacity: 0; }
}

canvas {
    position: fixed;
    top: 0;
    left: 0;
    pointer-events: none;
}
</style>
</head>
<body>

<canvas id="fireworks"></canvas>

<div class="container">
    <div class="name">ANNASTACIA 🎂</div>
    <h2>Happy 22nd Birthday ✨</h2>
    <div id="typedText"></div>

    <button onclick="showWish()">Make a Wish ✨</button>
    <div class="wish" id="wishText">Close your eyes, smile, and make the biggest wish for this new year 🌟</div>

    <button onclick="revealMessage()">Click for a Surprise 💌</button>
    <div class="hidden-message" id="hiddenMessage">
        No matter where life takes you this year,  
        I genuinely hope it leads you to happiness, success, growth, and beautiful memories.  
        Keep becoming the amazing person you are meant to be.
    </div>
</div>

<script>
// CHANGE HER NAME HERE
const herName = "ANNASTACIA";

// Typing Message
const message = `It’s officially 12:00 🕛✨

Happy 22nd Birthday, ${herName}.

As you step into 22, I hope this year brings you clarity, confidence, growth, and success in everything you do.

May doors open for you.
May your efforts turn into results.
May your dreams slowly become achievements.

Keep aiming higher.
Keep believing in yourself.

Welcome to 22 🌟`;

let i = 0;
function typeWriter() {
    if (i < message.length) {
        document.getElementById("typedText").innerHTML += message.charAt(i);
        i++;
        setTimeout(typeWriter, 40);
    }
}
typeWriter();

// Floating Hearts
function createHeart() {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "💖";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (Math.random() * 25 + 15) + "px";
    heart.style.animationDuration = (Math.random() * 5 + 5) + "s";
    document.body.appendChild(heart);
    setTimeout(() => heart.remove(), 8000);
}
setInterval(createHeart, 300);

// Show Wish
function showWish() {
    document.getElementById("wishText").style.display = "block";
}

// Reveal Hidden Message
function revealMessage() {
    document.getElementById("hiddenMessage").style.display = "block";
}

// Fireworks
const canvas = document.getElementById("fireworks");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

function createFirework() {
    let x = Math.random() * canvas.width;
    let y = Math.random() * canvas.height / 2;
    for (let i = 0; i < 60; i++) {
        particles.push({
            x: x,
            y: y,
            angle: Math.random() * 2 * Math.PI,
            speed: Math.random() * 4 + 2,
            radius: 2
        });
    }
}

function animate() {
    ctx.fillStyle = "rgba(0,0,0,0.1)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    particles.forEach((p, index) => {
        p.x += Math.cos(p.angle) * p.speed;
        p.y += Math.sin(p.angle) * p.speed;
        p.radius *= 0.96;

        ctx.beginPath();
        ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
        ctx.fillStyle = "white";
        ctx.fill();

        if (p.radius < 0.5) {
            particles.splice(index, 1);
        }
    });

    requestAnimationFrame(animate);
}

setInterval(createFirework, 1200);
animate();
</script>

</body>
</html>
